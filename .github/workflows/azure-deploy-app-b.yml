name: Deploy Leaderboard to Azure App Service

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'server/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'tailwind.config.ts'
      - 'tsconfig*.json'
      - '.github/workflows/azure-deploy-app-b.yml'

env:
  NODE_VERSION: '20'
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: 3bb447ee-be09-4fd3-9f1c-104fc7776954
  AZURE_SUBSCRIPTION_ID: fdd05880-48dd-46bd-be4c-36f7039e71d7
  RESOURCE_GROUP: rg-portal-app-prod
  WEBAPP_NAME: leadi-portal-app-8n7

concurrency:
  group: leaderboard-deploy-main
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build frontend
        env:
          VITE_CHATBOT_BACKEND_URL: ${{ secrets.VITE_CHATBOT_BACKEND_URL }}
        run: |
          npm ci
          npm run build

      - name: Prepare server artifact
        run: |
          mkdir -p server/public
          rm -rf server/public/*
          cp -r dist/* server/public/

      - name: Install server dependencies (Linux runner)
        working-directory: server
        run: npm install --omit=dev

      - name: Package server artifact
        run: |
          cd server
          zip -r ../server.zip .

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Validate target web app exists
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -e
            az webapp show \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --name "${{ env.WEBAPP_NAME }}" >/dev/null
            echo "Target web app found"

      - name: Configure app settings safely
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -e
            set_setting_if_present () {
              local key="$1"
              local value="$2"

              if [ -z "$value" ]; then
                echo "$key secret is empty; preserving existing App Service value"
                return
              fi

              az webapp config appsettings set \
                --resource-group "${{ env.RESOURCE_GROUP }}" \
                --name "${{ env.WEBAPP_NAME }}" \
                --settings "$key=$value" >/dev/null
              echo "$key updated"
            }

            az webapp config appsettings set \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --name "${{ env.WEBAPP_NAME }}" \
              --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false ENABLE_ORYX_BUILD=false >/dev/null

            set_setting_if_present "N8N_WEBHOOK_URL" '${{ secrets.APP_B_N8N_WEBHOOK_URL }}'
            set_setting_if_present "CORS_ORIGIN" '${{ secrets.APP_B_CORS_ORIGIN }}'
            set_setting_if_present "AZURE_STORAGE_CONTAINER" '${{ secrets.APP_B_AZURE_STORAGE_CONTAINER }}'
            set_setting_if_present "AZURE_STORAGE_ACCOUNT_NAME" '${{ secrets.APP_B_AZURE_STORAGE_ACCOUNT_NAME }}'

      - name: Deploy to Azure Web App (ZipDeploy)
        uses: azure/cli@v2
        with:
          inlineScript: |
            set +e
            az webapp deployment source config-zip \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --name "${{ env.WEBAPP_NAME }}" \
              --src server.zip \
              --async true \
              --timeout 1800

            DEPLOY_EXIT_CODE=$?
            echo "ZipDeploy exit code: ${DEPLOY_EXIT_CODE}"
            echo "Continuing to smoke tests; Kudu may complete deployment asynchronously even when CLI exits non-zero."
            exit 0

  smoke_test:
    needs: [deploy]
    runs-on: ubuntu-latest
    name: Smoke Test
    steps:
      - name: Validate homepage
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ env.WEBAPP_NAME }}.azurewebsites.net/)
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "Homepage check passed with status $STATUS"
              exit 0
            fi
            echo "Homepage check failed with status $STATUS, retry $i/10"
            sleep 10
          done
          exit 1

      - name: Validate health endpoint
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ env.WEBAPP_NAME }}.azurewebsites.net/health)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Health check failed with status $STATUS, retry $i/10"
            sleep 10
          done
          exit 1
